<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Portfolio</title>

<style>
/* =========================================
   1. RESET & BASE (ล้างค่าพื้นฐาน)
   ========================================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth; /* ช่วยให้หน้าจอเลื่อนสไลด์อย่างนุ่มนวลเวลาคลิกลิงก์เมนู */
}

body {
  background: #e2e2e2;
  color: #000;
  font-family: Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

a {
  text-decoration: none;
  color: inherit;
  transition: opacity 0.3s ease;
}

a:hover {
  opacity: 0.5;
}

/* โครงสร้างหลักของแต่ละหน้า (1 หน้าจอพอดี) */
.section-wrapper {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* =========================================
   2. REUSABLE UI (สไตล์ที่ใช้ซ้ำทุกหน้า)
   ========================================= */
/* ก้อนหัวข้อ Creative Work / Experience */
.title-group {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.title-row {
  display: flex;
  justify-content: space-between;
  width: 250px;
  align-items: center;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
}

.title-row h2 { font-size: 18px; margin: 0; }
.title-row span { font-size: 16px; }

/* เมนูแนวตั้ง (Home, About, Work, Contact) */
.nav-vertical {
  display: flex;
  flex-direction: column;
  gap: 10px;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.5px;
  opacity: 0.7;
}
.nav-vertical a:hover { opacity: 1; }

/* =========================================
   3. SECTION: STORYBOARD (หน้าแรก)
   ========================================= */
#storyboard {
  background: #e2e2e2;
  color: #000;
}

/* ตั้งตำแหน่งตำแหน่งเมนูซ้ายบนของหน้าแรกให้ลอยเด่นเหนือกองแฟ้มและกดได้ */
.top-left-menu {
  position: absolute;
  top: 80px;
  left: 8%;
  z-index: 99;
}

/* เมนูบนขวา (เฉพาะหน้านี้) */
.top-right-nav {
  position: absolute;
  top: 60px;
  right: 60px;
  display: flex;
  gap: 30px;
  font-size: 12px;
  font-weight: bold;
  z-index: 50;
}

/* ข้อความ Storyboard กลางซ้าย */
.sb-text-block {
  position: absolute;
  top: 55%;
  left: 8%;
  transform: translateY(-50%);
  z-index: 50;
}
.sb-text-block h3 { font-size: 16px; margin-bottom: 10px; font-weight: bold; }
.sb-text-block .line { width: 40px; height: 1px; background: #000; margin-bottom: 15px; }
.sb-text-block p { font-size: 13px; color: #444; line-height: 1.5; }

/* กองแฟ้มตรงกลางขวา */
.folders-wrap {
  position: absolute;
  right: 8%;      
  top: 55%;        
  transform: translateY(-50%);
  width: 55vw;
  max-width: 900px; 
  height: 70vh;
  transition: all 0.5s ease;
  z-index: 10;
}
.folder-img {
  position: absolute; left: 0; width: 100%; height: auto; cursor: pointer; transition: transform 0.3s ease; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.15));
}
.folder-img:hover { transform: translateY(-15px); }
