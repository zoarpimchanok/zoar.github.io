<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Portfolio</title>

<style>
/* =========================================
   1. RESET & BASE (ล้างค่าพื้นฐาน)
   ========================================= */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth; /* ช่วยให้หน้าจอเลื่อนสไลด์อย่างนุ่มนวลเวลาคลิกลิงก์เมนู */
}

body {
  background: #e2e2e2;
  color: #000;
  font-family: Helvetica, Arial, sans-serif;
  overflow-x: hidden;
}

a {
  text-decoration: none;
  color: inherit;
  transition: opacity 0.3s ease;
}

a:hover {
  opacity: 0.5;
}

/* โครงสร้างหลักของแต่ละหน้า (1 หน้าจอพอดี) */
.section-wrapper {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* =========================================
   2. REUSABLE UI (สไตล์ที่ใช้ซ้ำทุกหน้า)
   ========================================= */
/* ก้อนหัวข้อ Creative Work / Experience */
.title-group {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.title-row {
  display: flex;
  justify-content: space-between;
  width: 250px;
  align-items: center;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
}

.title-row h2 { font-size: 18px; margin: 0; }
.title-row span { font-size: 16px; }

/* เมนูแนวตั้ง (Home, About, Work, Contact) */
.nav-vertical {
  display: flex;
  flex-direction: column;
  gap: 10px;
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 0.5px;
  opacity: 0.7;
}
.nav-vertical a:hover { opacity: 1; }

/* =========================================
   3. SECTION: STORYBOARD (หน้าแรก)
   ========================================= */
#storyboard {
  background: #e2e2e2;
  color: #000;
}

/* ตั้งตำแหน่งตำแหน่งเมนูซ้ายบนของหน้าแรกให้ลอยเด่นเหนือกองแฟ้มและกดได้ */
.top-left-menu {
  position: absolute;
  top: 80px;
  left: 8%;
  z-index: 99;
}

/* เมนูบนขวา (เฉพาะหน้านี้) */
.top-right-nav {
  position: absolute;
  top: 60px;
  right: 60px;
  display: flex;
  gap: 30px;
  font-size: 12px;
  font-weight: bold;
  z-index: 50;
}

/* ข้อความ Storyboard กลางซ้าย */
.sb-text-block {
  position: absolute;
  top: 55%;
  left: 8%;
  transform: translateY(-50%);
  z-index: 50;
}
.sb-text-block h3 { font-size: 16px; margin-bottom: 10px; font-weight: bold; }
.sb-text-block .line { width: 40px; height: 1px; background: #000; margin-bottom: 15px; }
.sb-text-block p { font-size: 13px; color: #444; line-height: 1.5; }

/* กองแฟ้มตรงกลางขวา */
.folders-wrap {
  position: absolute;
  right: 8%;      
  top: 55%;        
  transform: translateY(-50%);
  width: 55vw;
  max-width: 900px; 
  height: 70vh;
  transition: all 0.5s ease;
  z-index: 10;
}
.folder-img {
  position: absolute; left: 0; width: 100%; height: auto; cursor: pointer; transition: transform 0.3s ease; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.15));
}
.folder-img:hover { transform: translateY(-15px); }
#tab-nitto { z-index: 1; top: 0px; }
#tab-pramy { z-index: 2; top: 40px; }
#tab-laneige1 { z-index: 3; top: 80px; }
#tab-laneige2 { z-index: 4; top: 120px; }

/* เนื้อหาในแฟ้ม */
.inside-wrap {
  position: absolute; 
  right: 8%; 
  top: 50%; 
  transform: translateY(-50%); 
  width: 60vw; 
  max-width: 1000px; 
  z-index: 99;  
  pointer-events: none; /* เริ่มต้นให้ทะลุได้ เพื่อไม่ให้กล่องเปล่าไปบังหน้าแฟ้มหลัก */
}

/* เพิ่มคลาส active ให้ตัวครอบเปิดการคลิกเมื่อเปิดแฟ้ม */
.inside-wrap.active {
  pointer-events: auto;
}

.inside-content-img {
  position: absolute; 
  top: 50%; 
  left: 0; 
  transform: translateY(-50%) scale(0.95); 
  width: 100%; 
  height: auto; 
  opacity: 0; 
  transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); 
  border-radius: 10px; 
  cursor: default; /* เปลี่ยนเป็นลูกศรปกติ เพราะเราต้องการให้มากดที่ปุ่ม BACK แทน */
  z-index: 10;     /* อยู่ในระนาบด้านล่างของปุ่ม BACK เพื่อไม่ให้ขอบภาพบังพิกัดเมาส์ */
  pointer-events: none; 
}
.inside-content-img.active { 
  opacity: 1; 
  transform: translateY(-50%) scale(1);  
  pointer-events: auto; 
}

/* ปุ่มย้อนกลับ */
.btn-back-folder {
  position: absolute; 
  top: -30px; 
  right: 40px; 
  background: rgba(0, 0, 0, 0.6); 
  border: 1px solid #fff; 
  color: #fff; 
  padding: 10px 25px; 
  font-size: 12px; 
  font-weight: bold; 
  letter-spacing: 2px; 
  cursor: pointer; 
  transition: all 0.4s ease; 
  text-transform: uppercase; 
  backdrop-filter: blur(4px);    
  z-index: 999999 !important; /* การันตีลอยเหนือน้ำและพ้นขอบรูปภาพชัวร์ 100% */
  opacity: 0; 
  pointer-events: none;       
}
.btn-back-folder:hover { background: #fff; color: #000; opacity: 1 !important; }
.btn-back-folder.active { 
  opacity: 1; 
  pointer-events: auto; 
}

/* กระดาษพรีวิวเล็ก */
.ex-tab-floating { position: absolute; left: 105px; bottom: -240px; width: 180px; opacity: 0; transition: all 0.6s ease; transform: translateY(20px); pointer-events: none; border-radius: 6px; z-index: 50; }
.ex-tab-floating.active { opacity: 1; transform: translateY(0) rotate(0deg); pointer-events: auto; cursor: pointer; }
.ex-tab-floating:hover { transform: translateY(-10px) rotate(0deg) scale(1.05); }
.folders-hidden { opacity: 0; transform: translateY(-30%) scale(0.95); pointer-events: none; }

/* Popup สตอรี่บอร์ด */
.sb-detail-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
.sb-detail-overlay.active { display: flex; animation: fadeIn 0.4s ease; }
.sb-container { width: 95%; max-width: 1400px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 0; }
.sb-grid { display: flex; gap: 15px; justify-content: center; perspective: 1000px; }
.sb-sheet { width: 23%; height: auto; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); transform: rotateY(10deg); transition: transform 0.3s ease; }
.sb-sheet:hover { transform: scale(1.05) rotateY(0deg); z-index: 10; }
.btn-closed-frame { margin-top: 40px; background: none; border: 2px solid #fff; color: #fff; padding: 12px 35px; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 4px; cursor: pointer; transition: all 0.3s ease; }
.btn-closed-frame:hover { background: #fff; color: #000; transform: scale(1.05); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* =========================================
   4. SECTION: PRODUCTION (หน้าสอง)
   ========================================= */
#production {
  background: #000;
  color: #fff;
}

.production-head {
  position: absolute; top: 80px; right: 80px; text-align: right; z-index: 20;
}
.production-head h4 { font-size: 16px; border-bottom: 1px solid #fff; display: inline-block; padding-bottom: 5px; }
.production-head p { font-size: 12px; color: #777; margin-top: 10px; }

/* แถววิดีโอกึ่งกลางจอ */
.production-row {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  display: flex; justify-content: center; align-items: center; gap: 15px; height: 400px; width: 100vw; z-index: 10;
}
.production-row:hover .work { opacity: 0.3; filter: grayscale(100%); }

.work { position: relative; display: block; flex: 0 0 120px; height: 250px; overflow: hidden; transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); cursor: pointer; background: #000; }
.work img { width: 100%; height: 100%; object-fit: cover; transition: all 0.6s ease; }
.work:hover { flex: 0 0 320px; height: 420px; opacity: 1 !important; filter: grayscale(0) !important; z-index: 10; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

.overlay { position: absolute; inset: 0; background: rgba(255, 255, 255, 0.95); color: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; opacity: 0; transition: opacity 0.4s ease 0.2s; }
.work:hover .overlay { opacity: 1; }
